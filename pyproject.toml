# pyproject.toml — packaging and adapter entry-point declarations.
#
# RESPONSIBILITY
#   Single source of truth for the `harness` distribution: dependencies,
#   tooling config, and the entry-point groups that make adapter discovery
#   work.
#
# WHAT TO IMPLEMENT
#   - Build backend: hatchling or setuptools, pick one and stick to it.
#   - Project metadata: name = "harness", license, Python >=3.10.
#   - Runtime deps: pydantic (config schema), PyYAML (config loader).
#     Nothing else in core. If you reach for a 4th dep, justify it first.
#   - Optional extras keyed by integration name: langgraph, langchain,
#     crewai, pydantic-ai, openai-agents, anthropic. Each pulls only that
#     framework's SDK.
#   - Entry-point groups for adapter discovery — these are LOAD-BEARING.
#     Adapter packages (harness-enterprise, third-party) register under
#     the same group names:
#       harness.scanners       → Scanner implementations
#       harness.policy         → PolicyEngine implementations
#       harness.audit_sinks    → AuditSink implementations
#       harness.tool_registry  → ToolRegistry implementations
#       harness.secrets        → SecretsProvider implementations
#     Register every reference adapter shipped in this package under the
#     correct group.
#
# DO NOT
#   - Add a console-script entry point. The CLI lives in harness-cli.
#   - Pin upper bounds on deps without a concrete compat reason.
#   - Add framework SDKs to runtime deps. They are extras, not runtime.
