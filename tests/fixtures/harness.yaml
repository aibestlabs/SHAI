# tests/fixtures/harness.yaml — canonical configuration used by tests.
#
# RESPONSIBILITY
#   A working harness.yaml that exercises every reference adapter and
#   every config branch the schema supports. Tests load this file in
#   the `harness` fixture (see tests/conftest.py).
#
# WHAT TO IMPLEMENT
#   - One scan_input block with regex_pii and basic_injection scanners.
#   - One scan_output block with regex_pii.
#   - check_tool_call with arg_scanners = [regex_pii] and
#     scan_args_for_tags = ["sensitive"].
#   - policy: rules, pointing at tests/fixtures/policy.yaml.
#   - audit_sinks: stdout. (Tests override this at construction time
#     with the recording sink — see conftest.py.)
#   - tool_registry: memory.
#   - secrets: env.
#
# DO NOT
#   - Reference enterprise adapter names. Tests run with `pip install
#     harness` only.
#   - Inline secrets here. Use ${ENV_VAR} for any value tests need to
#     parameterize.
