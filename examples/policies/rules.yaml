# examples/policies/rules.yaml — example policy bundle.
#
# RESPONSIBILITY
#   Show the reference RuleBasedPolicy grammar end-to-end with real,
#   readable rules. Loaded by examples/hand_rolled_loop.py and
#   examples/langgraph_agent.py.
#
# WHAT TO IMPLEMENT
#   At least one of each kind of rule:
#     - allow by tag (e.g. allow tools tagged "read" universally).
#     - deny by tag scoped to tenant (e.g. deny "external_write" in
#       tenant "demo" with a clear reason).
#     - redact a field in args (e.g. for a "send_email" tool, redact
#       the "body" field to a placeholder when ctx.user_id is unknown).
#     - allow with an `all` combinator (multiple conditions).
#     - explicit terminal allow (so default-allow fallthrough is also
#       represented but not relied on).
#
#   Each rule has an `id` for traceability — used in PolicyDecision.rule_id
#   and surfaced in AuditEvent.extra.
#
# DO NOT
#   - Reference enterprise grammar features (expression languages,
#     external lookups). This is the REFERENCE grammar.
#   - Add comments inside the YAML beyond what fits in two lines per
#     rule. Detailed grammar docs live in docs/policy.md.
